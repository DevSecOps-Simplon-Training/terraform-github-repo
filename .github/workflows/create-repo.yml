name: Create GitHub Repository with Terraform
run-name: "Create repo '${{ inputs.repo_name }}' - ${{ inputs.repo_description || 'no description' }}"

on:
  workflow_dispatch:
    inputs:
      repo_name:
        description: "Name of the GitHub repository to create"
        required: true
        type: string
      repo_description:
        description: "Repository description"
        required: false
        type: string
        default: ""

# Pass secrets and workflow inputs as Terraform variables
env:
  TF_VAR_github_owner: ${{ secrets.GH_OWNER }}
  TF_VAR_github_token: ${{ secrets.GH_TOKEN }}
  TF_VAR_gitignore_template: "Terraform"
  TF_VAR_repo_name: ${{ inputs.repo_name }}
  TF_VAR_repo_description: ${{ inputs.repo_description }}
  TF_VAR_collaborators: "{}"

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.3"

      # Download providers and initialize the working directory
      - name: Terraform Init
        run: terraform init

      # Fail if any file is not properly formatted
      - name: Terraform Format Check
        run: terraform fmt -check

      # Validate configuration syntax and internal consistency
      - name: Terraform Validate
        run: terraform validate

      # Preview the changes that will be applied
      - name: Terraform Plan
        run: terraform plan -no-color

      # Apply changes and create the repository (without collaborators)
      - name: Terraform Apply
        run: terraform apply -auto-approve -no-color
