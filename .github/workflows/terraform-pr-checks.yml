name: Terraform PR Checks

on:
  pull_request:
    branches: [main]
    paths:
      - "**.tf"
      - ".github/workflows/**.yml"

jobs:
  # -------------------------------------------------------
  # 1. Format + Validate
  # -------------------------------------------------------
  lint:
    name: Format & Validate
    runs-on: ubuntu-latest

    env:
      TF_VAR_github_token: "dummy"
      TF_VAR_github_owner: "dummy"
      TF_VAR_repo_name: "dummy"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.3"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: TFLint
        run: |
          tflint --init
          tflint --format compact

  # -------------------------------------------------------
  # 2. Sécurité — Checkov
  # -------------------------------------------------------
  checkov:
    name: Checkov Security Scan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          output_format: cli,sarif
          output_file_path: console,results.sarif
          soft_fail: true  # ne bloque pas la PR, affiche seulement les résultats

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif

  # -------------------------------------------------------
  # 3. Terraform Plan (aperçu des changements)
  # -------------------------------------------------------
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: lint

    permissions:
      contents: read
      pull-requests: write

    env:
      TF_VAR_github_owner: ${{ secrets.GH_OWNER }}
      TF_VAR_github_token: ${{ secrets.GH_TOKEN }}
      TF_VAR_gitignore_template: "Terraform"
      TF_VAR_repo_name: "pr-preview"
      TF_VAR_repo_description: "Preview from PR #${{ github.event.pull_request.number }}"
      TF_VAR_collaborators: "{}"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.3"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -no-color 2>&1 | tee plan.txt

      - name: Post Plan as PR comment
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(0, 60000) + '\n...(tronqué)' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`hcl\n${truncated}\n\`\`\``
            });
