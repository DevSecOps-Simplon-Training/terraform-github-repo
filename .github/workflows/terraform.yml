name: Create GitHub Repository with Terraform
run-name: "Create repo '${{ inputs.repo_name }}' - ${{ inputs.repo_description || 'no description' }}"

on:
  workflow_dispatch:
    inputs:
      repo_name:
        description: "Name of the GitHub repository to create"
        required: true
        type: string
      repo_description:
        description: "Repository description"
        required: false
        type: string
        default: ""
      collaborators:
        description: "Collaborators override — format: user1:push,user2:admin (empty = use DEFAULT_COLLABORATORS variable)"
        required: false
        type: string
        default: ""

# Pass secrets and workflow inputs as Terraform variables
env:
  TF_VAR_github_owner: ${{ secrets.GH_OWNER }}
  TF_VAR_github_token: ${{ secrets.GH_TOKEN }}
  TF_VAR_gitignore_template: "Terraform"
  TF_VAR_repo_name: ${{ inputs.repo_name }}
  TF_VAR_repo_description: ${{ inputs.repo_description }}

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.3"

      # Convert "user1:push,user2:admin" (input or DEFAULT_COLLABORATORS variable) to JSON map for Terraform
      - name: Parse collaborators
        run: |
          RAW="${{ inputs.collaborators }}"
          if [ -z "$RAW" ]; then
            RAW="${{ vars.DEFAULT_COLLABORATORS }}"
          fi
          if [ -z "$RAW" ]; then
            echo 'TF_VAR_collaborators={}' >> "$GITHUB_ENV"
          else
            JSON=$(echo "$RAW" | python3 -c "import json,sys;pairs=[p.strip().split(':',1) for p in sys.stdin.read().strip().split(',') if ':' in p.strip()];print(json.dumps({p[0].strip():p[1].strip() for p in pairs}))")
            echo "TF_VAR_collaborators=$JSON" >> "$GITHUB_ENV"
          fi

      # Download providers and initialize the working directory
      - name: Terraform Init
        run: terraform init

      # Fail if any file is not properly formatted
      - name: Terraform Format Check
        run: terraform fmt -check

      # Validate configuration syntax and internal consistency
      - name: Terraform Validate
        run: terraform validate

      # Preview the changes that will be applied
      - name: Terraform Plan
        run: terraform plan -no-color

      # Apply changes and create the repository
      - name: Terraform Apply
        run: terraform apply -auto-approve -no-color
